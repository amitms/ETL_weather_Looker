applications:
  - name: airflow-etl
    memory: 2G
    disk_quota: 2G
    timeout: 180          # ← increase to 3 minutes
    buildpacks:
      - python_buildpack
    command: airflow standalone
    env:
      AIRFLOW_HOME: /home/vcap/app
      AIRFLOW__CORE__DAGS_FOLDER: /home/vcap/app/dags
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: "8080"
      GOOGLE_CREDENTIALS_PATH: /home/vcap/app/sapient-cycle-300703-e8b417737ae1.json